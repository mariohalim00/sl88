services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    environment:
      # Dokploy: set these in the environment variables panel.
      # The postgres hostname must match the service name below.
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/sl88}
      API_PORT: ${API_PORT:-3000}
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sl88}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sl88}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal
    # Port not exposed publicly — only the app container accesses it.
    # For local DB access, add: ports: ['5432:5432']

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
